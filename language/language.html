<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="langTitle"></title>

    <script src="language.js"></script>
    <script>
    // Apply direction immediately to prevent layout jump on load
    const savedLang = localStorage.getItem('language') || 'en';
    document.documentElement.dir = (savedLang === 'ar') ? 'rtl' : 'ltr';
    document.documentElement.lang = savedLang;
    </script>

</head>
<body>
    
<!-- test lang -->

    <a href="#0" onclick="changeLanguage('en')">English</a>
    <a href="#0" onclick="changeLanguage('fr')">France</a>
    <a href="#0" onclick="changeLanguage('es')">Spanish</a>
    <a href="#0" onclick="changeLanguage('de')">Greman</a>
    <a href="#0" onclick="changeLanguage('nl')">Dutch</a>

    <h1 data-i18n="home_message"></h1>
    <p data-i18n="about_message"></p>

    <p data-i18n="text"></p>

</body>
</html>
